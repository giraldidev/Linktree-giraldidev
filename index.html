<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinicius Giraldi | Linktree</title>
    <!-- Favicon -->
    <link rel="icon" href="img/foto 1.1.jpeg" type="image/x-icon" />
    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css">

  <body>

        <div class="popup-photo">
          <a href="img/foto 1.1.jpeg" target="_blank">
            <img src="img/foto 1.1.jpeg" alt="Profile Picture">

          "Qualquer tolo consegue escrever código que um computador entenda. Bons programadores escrevem código que humanos entendam." — Martin Fowler

    <div id="userName">
      @giraldidev

    <div id="links">

      </a>

        <i class="fab fa-instagram">&nbsp;</i>Instagram
      </a>
      <a class="link" href="https://twitter.com/giraldidev" target="_blank">
        <i class="fab fa-twitter">&nbsp;</i>Twitter
      </a>
      <a class="link" href="https://open.spotify.com/user/31flcd2rx2a5w4hp55wjhfgxfgfy?si=BEwL59CAQU6HvONmxg6DZQ" target="_blank">
        <i class="fa fa-play-circle">&nbsp;</i>Spotify
      </a>

    <div id="hashtag">
      By Vinicius Giraldi
    </div>
